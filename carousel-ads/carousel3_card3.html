<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
<title>Carousel 3 - Card 3: Drug Agent</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px;
    font-family: 'Inter', sans-serif;
    background: linear-gradient(160deg, #0A1628 0%, #0B2540 60%, #0A2A3C 100%);
    overflow: hidden;
    position: relative;
  }
  .accent-glow {
    position: absolute;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: #FFB703;
    filter: blur(180px);
    opacity: 0.07;
    top: -100px; right: -100px;
  }
  .content {
    position: relative; z-index: 2;
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center;
    padding: 70px 80px 120px;
  }
  .top-bar {
    display: flex; justify-content: space-between; align-items: center;
    width: 100%;
    margin-bottom: 30px;
  }
  .module-label {
    font-size: 15px; font-weight: 700;
    color: #FFB703;
    letter-spacing: 4px;
    text-transform: uppercase;
  }
  .indicator {
    font-size: 20px; font-weight: 700;
    color: rgba(255,255,255,0.4);
    letter-spacing: 2px;
  }
  .icon-container {
    width: 120px; height: 120px;
    border-radius: 28px;
    background: rgba(255,183,3,0.08);
    border: 2px solid rgba(255,183,3,0.2);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 40px;
  }
  .module-name {
    font-size: 56px; font-weight: 900;
    color: #FFFFFF;
    text-align: center;
    margin-bottom: 16px;
  }
  .module-sub {
    font-size: 20px; font-weight: 400;
    color: rgba(255,255,255,0.45);
    margin-bottom: 60px;
  }
  .features {
    list-style: none;
    width: 100%;
    max-width: 700px;
  }
  .features li {
    display: flex; align-items: center;
    padding: 22px 28px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px;
    margin-bottom: 14px;
    font-size: 24px; font-weight: 500;
    color: rgba(255,255,255,0.85);
  }
  .feature-icon {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #FFB703;
    margin-right: 20px;
    flex-shrink: 0;
  }
  .cta-bottom {
    margin-top: auto;
    font-size: 18px; font-weight: 600;
    color: #FFB703;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .branding {
    position: absolute; bottom: 40px; left: 0; right: 0;
    text-align: center;
  }
  .brand-name {
    font-size: 20px; font-weight: 800;
    color: #FFFFFF;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .brand-tagline {
    font-size: 13px; font-weight: 400;
    color: rgba(255,255,255,0.4);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .top-accent {
    position: absolute; top: 0; left: 0; right: 0; height: 4px;
    background: linear-gradient(90deg, #FFB703, #00B4D8);
  }
</style>
</head>
<body>
<div class="top-accent"></div>
<div class="accent-glow"></div>

<div class="content">
  <div class="top-bar">
    <span class="module-label">Licensing Module</span>
    <span class="indicator">3 / 5</span>
  </div>

  <div class="icon-container">
    <svg width="60" height="60" viewBox="0 0 60 60">
      <!-- Pill icon -->
      <rect x="15" y="22" width="30" height="16" rx="8" fill="none" stroke="#FFB703" stroke-width="2.5" transform="rotate(-30, 30, 30)"/>
      <line x1="30" y1="18" x2="30" y2="42" stroke="#FFB703" stroke-width="1.5" transform="rotate(-30, 30, 30)"/>
      <!-- Molecule dots -->
      <circle cx="48" cy="14" r="3" fill="#FFB703" opacity="0.6"/>
      <circle cx="52" cy="22" r="2" fill="#FFB703" opacity="0.4"/>
      <line x1="48" y1="17" x2="52" y2="20" stroke="#FFB703" stroke-width="1" opacity="0.4"/>
      <circle cx="12" cy="46" r="3" fill="#FFB703" opacity="0.6"/>
      <circle cx="8" cy="38" r="2" fill="#FFB703" opacity="0.4"/>
      <line x1="12" y1="43" x2="8" y2="40" stroke="#FFB703" stroke-width="1" opacity="0.4"/>
    </svg>
  </div>

  <h1 class="module-name">Drug Agent</h1>
  <p class="module-sub">Therapeutic Intelligence Platform</p>

  <ul class="features">
    <li><span class="feature-icon"></span>Full therapeutic landscape</li>
    <li><span class="feature-icon"></span>8.6M biological vectors</li>
    <li><span class="feature-icon"></span>Safety signals &amp; pharmacogenomics</li>
    <li><span class="feature-icon"></span>Clinical trial evidence mapping</li>
  </ul>

  <div class="cta-bottom">Contact for Pricing</div>

  <div class="branding">
    <div class="brand-name">Ayass Bioscience</div>
    <div class="brand-tagline">Intelligent Biology in Motion</div>
  </div>
</div>
</body>
</html>
