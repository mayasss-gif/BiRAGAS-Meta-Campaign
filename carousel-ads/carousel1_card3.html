<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
<title>Carousel 1 - Card 3: The Solution</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px;
    font-family: 'Inter', sans-serif;
    background: #0A1628;
    overflow: hidden;
    position: relative;
  }
  .glow {
    position: absolute;
    width: 600px; height: 600px;
    border-radius: 50%;
    background: #00B4D8;
    filter: blur(200px);
    opacity: 0.08;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }
  .content {
    position: relative; z-index: 2;
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center;
    padding: 60px 70px 100px;
  }
  .indicator {
    position: absolute; top: 48px; right: 56px;
    font-size: 20px; font-weight: 700;
    color: rgba(255,255,255,0.4);
    letter-spacing: 2px;
  }
  .title {
    font-size: 48px; font-weight: 900;
    color: #FFFFFF;
    text-align: center;
    margin-bottom: 10px;
    margin-top: 20px;
    letter-spacing: -1px;
  }
  .title span { color: #00B4D8; }
  .subtitle {
    font-size: 18px; font-weight: 400;
    color: rgba(255,255,255,0.5);
    text-align: center;
    margin-bottom: 36px;
  }
  .diagram-container {
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    width: 100%;
  }
  .subtext {
    font-size: 18px; font-weight: 400;
    color: rgba(255,255,255,0.5);
    text-align: center;
    line-height: 1.6;
    max-width: 800px;
    margin-top: 20px;
  }
  .subtext strong { color: #00B4D8; font-weight: 600; }
  .branding {
    position: absolute; bottom: 40px; left: 0; right: 0;
    text-align: center;
  }
  .brand-name {
    font-size: 22px; font-weight: 800;
    color: #FFFFFF;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .brand-tagline {
    font-size: 14px; font-weight: 400;
    color: rgba(255,255,255,0.45);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .top-accent {
    position: absolute; top: 0; left: 0; right: 0; height: 4px;
    background: linear-gradient(90deg, #00B4D8, #FFB703, #2DC653);
  }
</style>
</head>
<body>
<div class="top-accent"></div>
<div class="glow"></div>

<div class="content">
  <div class="indicator">3 / 5</div>

  <h1 class="title"><span>4</span> Causal Layers. <span>9</span> Data Streams.</h1>
  <p class="subtitle">Unified Topological Architecture</p>

  <div class="diagram-container">
    <svg width="700" height="580" viewBox="0 0 700 580">
      <defs>
        <marker id="arrowDown" markerWidth="10" markerHeight="8" refX="5" refY="4" orient="auto">
          <polygon points="0 0, 10 4, 0 8" fill="rgba(255,255,255,0.4)"/>
        </marker>
        <filter id="glow1">
          <feGaussianBlur stdDeviation="4" result="blur"/>
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>

      <!-- Layer 0: SNPs (circles, gold) -->
      <text x="50" y="55" fill="rgba(255,183,3,0.5)" font-family="Inter" font-size="13" font-weight="700" letter-spacing="2">LAYER 0</text>
      <text x="130" y="55" fill="rgba(255,255,255,0.4)" font-family="Inter" font-size="13" font-weight="400">SNPs</text>
      <circle cx="250" cy="50" r="22" fill="none" stroke="#FFB703" stroke-width="2.5" filter="url(#glow1)"/>
      <text x="250" y="55" fill="#FFB703" font-family="Inter" font-size="11" font-weight="700" text-anchor="middle">SNP</text>
      <circle cx="350" cy="50" r="22" fill="none" stroke="#FFB703" stroke-width="2.5" filter="url(#glow1)"/>
      <text x="350" y="55" fill="#FFB703" font-family="Inter" font-size="11" font-weight="700" text-anchor="middle">SNP</text>
      <circle cx="450" cy="50" r="22" fill="none" stroke="#FFB703" stroke-width="2.5" filter="url(#glow1)"/>
      <text x="450" y="55" fill="#FFB703" font-family="Inter" font-size="11" font-weight="700" text-anchor="middle">SNP</text>
      <circle cx="550" cy="50" r="22" fill="none" stroke="#FFB703" stroke-width="2.5" filter="url(#glow1)"/>
      <text x="550" y="55" fill="#FFB703" font-family="Inter" font-size="11" font-weight="700" text-anchor="middle">SNP</text>
      <circle cx="650" cy="50" r="22" fill="none" stroke="#FFB703" stroke-width="2.5" filter="url(#glow1)"/>
      <text x="650" y="55" fill="#FFB703" font-family="Inter" font-size="11" font-weight="700" text-anchor="middle">SNP</text>

      <!-- Arrows Layer 0 -> 1 -->
      <line x1="260" y1="75" x2="310" y2="155" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" marker-end="url(#arrowDown)"/>
      <line x1="350" y1="75" x2="350" y2="155" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" marker-end="url(#arrowDown)"/>
      <line x1="440" y1="75" x2="390" y2="155" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" marker-end="url(#arrowDown)"/>
      <line x1="450" y1="75" x2="500" y2="155" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" marker-end="url(#arrowDown)"/>
      <line x1="550" y1="75" x2="500" y2="155" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" marker-end="url(#arrowDown)"/>
      <line x1="650" y1="75" x2="610" y2="155" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" marker-end="url(#arrowDown)"/>

      <!-- Layer 1: Genes (hexagons, teal) -->
      <text x="50" y="195" fill="rgba(0,180,216,0.5)" font-family="Inter" font-size="13" font-weight="700" letter-spacing="2">LAYER 1</text>
      <text x="130" y="195" fill="rgba(255,255,255,0.4)" font-family="Inter" font-size="13" font-weight="400">Genes</text>
      <!-- Hexagons -->
      <polygon points="350,160 378,175 378,205 350,220 322,205 322,175" fill="none" stroke="#00B4D8" stroke-width="2.5" filter="url(#glow1)"/>
      <text x="350" y="195" fill="#00B4D8" font-family="Inter" font-size="11" font-weight="700" text-anchor="middle">Gene</text>
      <polygon points="500,160 528,175 528,205 500,220 472,205 472,175" fill="none" stroke="#00B4D8" stroke-width="2.5" filter="url(#glow1)"/>
      <text x="500" y="195" fill="#00B4D8" font-family="Inter" font-size="11" font-weight="700" text-anchor="middle">Gene</text>
      <polygon points="610,160 638,175 638,205 610,220 582,205 582,175" fill="none" stroke="#00B4D8" stroke-width="2.5" filter="url(#glow1)"/>
      <text x="610" y="195" fill="#00B4D8" font-family="Inter" font-size="11" font-weight="700" text-anchor="middle">Gene</text>

      <!-- Arrows Layer 1 -> 2 -->
      <line x1="350" y1="222" x2="380" y2="310" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" marker-end="url(#arrowDown)"/>
      <line x1="500" y1="222" x2="470" y2="310" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" marker-end="url(#arrowDown)"/>
      <line x1="500" y1="222" x2="550" y2="310" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" marker-end="url(#arrowDown)"/>
      <line x1="610" y1="222" x2="550" y2="310" stroke="rgba(255,255,255,0.2)" stroke-width="1.5" marker-end="url(#arrowDown)"/>

      <!-- Layer 2: Pathways (rectangles, emerald) -->
      <text x="50" y="345" fill="rgba(45,198,83,0.5)" font-family="Inter" font-size="13" font-weight="700" letter-spacing="2">LAYER 2</text>
      <text x="130" y="345" fill="rgba(255,255,255,0.4)" font-family="Inter" font-size="13" font-weight="400">Pathways</text>
      <rect x="345" y="310" width="120" height="45" rx="6" fill="none" stroke="#2DC653" stroke-width="2.5" filter="url(#glow1)"/>
      <text x="405" y="338" fill="#2DC653" font-family="Inter" font-size="12" font-weight="700" text-anchor="middle">Pathway</text>
      <rect x="510" y="310" width="120" height="45" rx="6" fill="none" stroke="#2DC653" stroke-width="2.5" filter="url(#glow1)"/>
      <text x="570" y="338" fill="#2DC653" font-family="Inter" font-size="12" font-weight="700" text-anchor="middle">Pathway</text>

      <!-- Arrows Layer 2 -> 3 -->
      <line x1="405" y1="358" x2="460" y2="440" stroke="rgba(255,255,255,0.25)" stroke-width="2" marker-end="url(#arrowDown)"/>
      <line x1="570" y1="358" x2="510" y2="440" stroke="rgba(255,255,255,0.25)" stroke-width="2" marker-end="url(#arrowDown)"/>

      <!-- Layer 3: Disease (diamond, white) -->
      <text x="50" y="480" fill="rgba(255,255,255,0.5)" font-family="Inter" font-size="13" font-weight="700" letter-spacing="2">LAYER 3</text>
      <text x="130" y="480" fill="rgba(255,255,255,0.4)" font-family="Inter" font-size="13" font-weight="400">Disease</text>
      <polygon points="485,440 530,475 485,510 440,475" fill="none" stroke="#FFFFFF" stroke-width="3" filter="url(#glow1)"/>
      <text x="485" y="480" fill="#FFFFFF" font-family="Inter" font-size="12" font-weight="800" text-anchor="middle">Disease</text>
    </svg>
  </div>

  <p class="subtext"><strong>BiRAGAS</strong> integrates transcriptomics, GWAS, MR, eQTL, CRISPR, SIGNOR into a unified causal framework.</p>

  <div class="branding">
    <div class="brand-name">Ayass Bioscience</div>
    <div class="brand-tagline">Intelligent Biology in Motion</div>
  </div>
</div>
</body>
</html>
