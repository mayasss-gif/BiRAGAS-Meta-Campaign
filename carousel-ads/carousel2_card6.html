<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
<title>Carousel 2 - Card 6: Phase 6 Comparative Evolution</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px;
    font-family: 'Inter', sans-serif;
    background: #0A1628;
    overflow: hidden;
    position: relative;
  }
  .phase-bg {
    position: absolute; top: -40px; right: -40px;
    font-size: 360px; font-weight: 900;
    color: rgba(233,30,140,0.04);
    line-height: 1;
  }
  .accent-glow {
    position: absolute;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: #E91E8C;
    filter: blur(160px);
    opacity: 0.1;
    bottom: -100px; left: -100px;
  }
  .content {
    position: relative; z-index: 2;
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    padding: 60px 80px 100px;
  }
  .top-bar {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 40px;
  }
  .phase-label {
    font-size: 16px; font-weight: 700;
    color: #E91E8C;
    letter-spacing: 4px;
    text-transform: uppercase;
  }
  .indicator {
    font-size: 20px; font-weight: 700;
    color: rgba(255,255,255,0.4);
    letter-spacing: 2px;
  }
  .phase-number {
    font-size: 100px; font-weight: 900;
    color: #E91E8C;
    line-height: 1;
    margin-bottom: 8px;
  }
  .phase-name {
    font-size: 48px; font-weight: 900;
    color: #FFFFFF;
    line-height: 1.1;
    margin-bottom: 50px;
  }
  .icon-container {
    width: 100px; height: 100px;
    margin-bottom: 40px;
  }
  .bullets {
    list-style: none;
    flex: 1;
  }
  .bullets li {
    display: flex; align-items: center;
    font-size: 24px; font-weight: 500;
    color: rgba(255,255,255,0.85);
    margin-bottom: 24px;
  }
  .bullet-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #E91E8C;
    margin-right: 20px;
    flex-shrink: 0;
  }
  .branding {
    position: absolute; bottom: 40px; left: 0; right: 0;
    text-align: center;
  }
  .brand-name {
    font-size: 20px; font-weight: 800;
    color: #FFFFFF;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .brand-tagline {
    font-size: 13px; font-weight: 400;
    color: rgba(255,255,255,0.4);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .top-accent {
    position: absolute; top: 0; left: 0; right: 0; height: 4px;
    background: #E91E8C;
  }
  .side-accent {
    position: absolute; left: 0; top: 0; bottom: 0; width: 5px;
    background: linear-gradient(180deg, #E91E8C, transparent);
  }
</style>
</head>
<body>
<div class="top-accent"></div>
<div class="side-accent"></div>
<div class="phase-bg">06</div>
<div class="accent-glow"></div>

<div class="content">
  <div class="top-bar">
    <span class="phase-label">Phase 6 of 7</span>
    <span class="indicator">6 / 7</span>
  </div>

  <div class="phase-number">06</div>
  <h1 class="phase-name">Comparative<br>Evolution</h1>

  <div class="icon-container">
    <svg width="100" height="100" viewBox="0 0 100 100">
      <!-- Two overlapping networks -->
      <!-- Network 1 -->
      <circle cx="30" cy="30" r="6" fill="none" stroke="#E91E8C" stroke-width="2"/>
      <circle cx="15" cy="55" r="6" fill="none" stroke="#E91E8C" stroke-width="2"/>
      <circle cx="45" cy="55" r="6" fill="none" stroke="#E91E8C" stroke-width="2" opacity="0.6"/>
      <line x1="27" y1="35" x2="18" y2="50" stroke="#E91E8C" stroke-width="1.5"/>
      <line x1="33" y1="35" x2="42" y2="50" stroke="#E91E8C" stroke-width="1.5"/>
      <line x1="21" y1="55" x2="39" y2="55" stroke="#E91E8C" stroke-width="1" stroke-dasharray="3,2"/>
      <!-- Network 2 -->
      <circle cx="70" cy="45" r="6" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2"/>
      <circle cx="55" cy="70" r="6" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2"/>
      <circle cx="85" cy="70" r="6" fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="2"/>
      <line x1="67" y1="50" x2="58" y2="65" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
      <line x1="73" y1="50" x2="82" y2="65" stroke="rgba(255,255,255,0.5)" stroke-width="1.5"/>
      <line x1="61" y1="70" x2="79" y2="70" stroke="rgba(255,255,255,0.3)" stroke-width="1" stroke-dasharray="3,2"/>
      <!-- Overlap indicator -->
      <circle cx="50" cy="50" r="24" fill="none" stroke="#E91E8C" stroke-width="1" stroke-dasharray="4,4" opacity="0.4"/>
    </svg>
  </div>

  <ul class="bullets">
    <li><span class="bullet-dot"></span>K-medoids patient stratification</li>
    <li><span class="bullet-dot"></span>DAG comparison across subgroups</li>
    <li><span class="bullet-dot"></span>5 conserved motif types</li>
    <li><span class="bullet-dot"></span>Molecular subtyping</li>
  </ul>

  <div class="branding">
    <div class="brand-name">Ayass Bioscience</div>
    <div class="brand-tagline">Intelligent Biology in Motion</div>
  </div>
</div>
</body>
</html>
