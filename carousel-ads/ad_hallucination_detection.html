<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
<title>Ad - Hallucination Detection (1200x628)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 628px;
    font-family: 'Inter', sans-serif;
    background: #0A1628;
    overflow: hidden;
    position: relative;
  }
  .bg-glow-1 {
    position: absolute;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: #00B4D8;
    filter: blur(150px);
    opacity: 0.08;
    top: -100px; left: -50px;
  }
  .bg-glow-2 {
    position: absolute;
    width: 350px; height: 350px;
    border-radius: 50%;
    background: #2DC653;
    filter: blur(150px);
    opacity: 0.06;
    bottom: -100px; right: -50px;
  }
  .content {
    position: relative; z-index: 2;
    width: 100%; height: 100%;
    display: flex;
    padding: 48px 60px;
  }
  .left {
    flex: 1;
    display: flex; flex-direction: column;
    justify-content: center;
    padding-right: 50px;
  }
  .title {
    font-size: 38px; font-weight: 900;
    color: #FFFFFF;
    line-height: 1.15;
    margin-bottom: 24px;
    letter-spacing: -0.5px;
  }
  .title span { color: #00B4D8; }
  .dual-gate {
    display: inline-flex; align-items: center;
    padding: 12px 24px;
    background: rgba(45,198,83,0.1);
    border: 1px solid rgba(45,198,83,0.3);
    border-radius: 10px;
    margin-bottom: 20px;
  }
  .dual-gate-text {
    font-size: 16px; font-weight: 700;
    color: #2DC653;
    letter-spacing: 0.5px;
  }
  .right {
    width: 520px;
    display: flex; flex-direction: column;
    justify-content: center;
    gap: 10px;
  }
  .hallucination-item {
    display: flex; align-items: center;
    padding: 16px 22px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px;
  }
  .shield {
    width: 42px; height: 42px;
    border-radius: 10px;
    background: rgba(45,198,83,0.12);
    display: flex; align-items: center; justify-content: center;
    margin-right: 16px;
    flex-shrink: 0;
  }
  .shield svg { width: 22px; height: 22px; }
  .h-number {
    font-size: 14px; font-weight: 800;
    color: #00B4D8;
    margin-right: 12px;
    min-width: 22px;
  }
  .h-text {
    font-size: 17px; font-weight: 600;
    color: rgba(255,255,255,0.85);
  }
  .branding {
    position: absolute; bottom: 24px; left: 60px;
    display: flex; align-items: center; gap: 16px;
  }
  .brand-name {
    font-size: 18px; font-weight: 800;
    color: #FFFFFF;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .brand-sep {
    width: 1px; height: 20px;
    background: rgba(255,255,255,0.2);
  }
  .brand-tagline {
    font-size: 12px; font-weight: 400;
    color: rgba(255,255,255,0.4);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .top-accent {
    position: absolute; top: 0; left: 0; right: 0; height: 4px;
    background: linear-gradient(90deg, #00B4D8, #2DC653, #FFB703);
  }
</style>
</head>
<body>
<div class="top-accent"></div>
<div class="bg-glow-1"></div>
<div class="bg-glow-2"></div>

<div class="content">
  <div class="left">
    <h1 class="title">AI Without<br>Hallucinations.<br><span>Biology You<br>Can Trust.</span></h1>

    <div class="dual-gate">
      <div class="dual-gate-text">Dual Gate: Score &ge; 0.65 AND Zero Hallucination Flags</div>
    </div>
  </div>

  <div class="right">
    <div class="hallucination-item">
      <div class="shield">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 2L3 7v6c0 5.25 3.75 10.15 9 11.35C17.25 23.15 21 18.25 21 13V7l-9-5z" fill="rgba(45,198,83,0.15)" stroke="#2DC653" stroke-width="1.5"/><path d="M8 12l3 3 5-5" stroke="#2DC653" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <span class="h-number">01</span>
      <span class="h-text">Spurious Edge Detection</span>
    </div>

    <div class="hallucination-item">
      <div class="shield">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 2L3 7v6c0 5.25 3.75 10.15 9 11.35C17.25 23.15 21 18.25 21 13V7l-9-5z" fill="rgba(45,198,83,0.15)" stroke="#2DC653" stroke-width="1.5"/><path d="M8 12l3 3 5-5" stroke="#2DC653" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <span class="h-number">02</span>
      <span class="h-text">Confounded Inference Detection</span>
    </div>

    <div class="hallucination-item">
      <div class="shield">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 2L3 7v6c0 5.25 3.75 10.15 9 11.35C17.25 23.15 21 18.25 21 13V7l-9-5z" fill="rgba(45,198,83,0.15)" stroke="#2DC653" stroke-width="1.5"/><path d="M8 12l3 3 5-5" stroke="#2DC653" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <span class="h-number">03</span>
      <span class="h-text">Directionality Error Detection</span>
    </div>

    <div class="hallucination-item">
      <div class="shield">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 2L3 7v6c0 5.25 3.75 10.15 9 11.35C17.25 23.15 21 18.25 21 13V7l-9-5z" fill="rgba(45,198,83,0.15)" stroke="#2DC653" stroke-width="1.5"/><path d="M8 12l3 3 5-5" stroke="#2DC653" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <span class="h-number">04</span>
      <span class="h-text">Pathway Gap Detection</span>
    </div>

    <div class="hallucination-item">
      <div class="shield">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 2L3 7v6c0 5.25 3.75 10.15 9 11.35C17.25 23.15 21 18.25 21 13V7l-9-5z" fill="rgba(45,198,83,0.15)" stroke="#2DC653" stroke-width="1.5"/><path d="M8 12l3 3 5-5" stroke="#2DC653" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <span class="h-number">05</span>
      <span class="h-text">Magnitude Error Detection</span>
    </div>
  </div>

  <div class="branding">
    <span class="brand-name">Ayass Bioscience</span>
    <span class="brand-sep"></span>
    <span class="brand-tagline">Intelligent Biology in Motion</span>
  </div>
</div>
</body>
</html>
