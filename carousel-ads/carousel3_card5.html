<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
<title>Carousel 3 - Card 5: Full Platform</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px;
    font-family: 'Inter', sans-serif;
    background: linear-gradient(160deg, #0A1628 0%, #0B2540 50%, #0A2A3C 100%);
    overflow: hidden;
    position: relative;
  }
  .accent-glow-1 {
    position: absolute;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: #FFB703;
    filter: blur(180px);
    opacity: 0.08;
    top: -150px; right: -100px;
  }
  .accent-glow-2 {
    position: absolute;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: #00B4D8;
    filter: blur(150px);
    opacity: 0.08;
    bottom: -100px; left: -100px;
  }
  .content {
    position: relative; z-index: 2;
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center;
    padding: 70px 80px 120px;
  }
  .top-bar {
    display: flex; justify-content: space-between; align-items: center;
    width: 100%;
    margin-bottom: 20px;
  }
  .module-label {
    font-size: 15px; font-weight: 700;
    color: #FFB703;
    letter-spacing: 4px;
    text-transform: uppercase;
  }
  .indicator {
    font-size: 20px; font-weight: 700;
    color: rgba(255,255,255,0.4);
    letter-spacing: 2px;
  }
  .badge {
    display: inline-flex; align-items: center;
    padding: 10px 28px;
    background: linear-gradient(135deg, #FFB703, #FF9500);
    border-radius: 30px;
    margin-bottom: 30px;
  }
  .badge-text {
    font-size: 16px; font-weight: 800;
    color: #0A1628;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .badge-star {
    margin-right: 10px;
    font-size: 18px;
    color: #0A1628;
  }
  .icon-container {
    width: 120px; height: 120px;
    border-radius: 28px;
    background: linear-gradient(135deg, rgba(255,183,3,0.12), rgba(0,180,216,0.12));
    border: 2px solid rgba(255,183,3,0.3);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 32px;
  }
  .module-name {
    font-size: 56px; font-weight: 900;
    color: #FFFFFF;
    text-align: center;
    margin-bottom: 12px;
  }
  .module-sub {
    font-size: 20px; font-weight: 400;
    color: rgba(255,255,255,0.45);
    margin-bottom: 44px;
  }
  .features {
    list-style: none;
    width: 100%;
    max-width: 700px;
  }
  .features li {
    display: flex; align-items: center;
    padding: 20px 28px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,183,3,0.12);
    border-radius: 14px;
    margin-bottom: 12px;
    font-size: 23px; font-weight: 500;
    color: rgba(255,255,255,0.85);
  }
  .feature-icon {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #FFB703;
    margin-right: 20px;
    flex-shrink: 0;
  }
  .cta-bottom {
    margin-top: auto;
    font-size: 18px; font-weight: 600;
    color: #FFB703;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .branding {
    position: absolute; bottom: 40px; left: 0; right: 0;
    text-align: center;
  }
  .brand-name {
    font-size: 20px; font-weight: 800;
    color: #FFFFFF;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .brand-tagline {
    font-size: 13px; font-weight: 400;
    color: rgba(255,255,255,0.4);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .top-accent {
    position: absolute; top: 0; left: 0; right: 0; height: 4px;
    background: linear-gradient(90deg, #FFB703, #00B4D8, #2DC653);
  }
</style>
</head>
<body>
<div class="top-accent"></div>
<div class="accent-glow-1"></div>
<div class="accent-glow-2"></div>

<div class="content">
  <div class="top-bar">
    <span class="module-label">Licensing Module</span>
    <span class="indicator">5 / 5</span>
  </div>

  <div class="badge">
    <span class="badge-star">&#9733;</span>
    <span class="badge-text">Most Popular</span>
  </div>

  <div class="icon-container">
    <svg width="60" height="60" viewBox="0 0 60 60">
      <!-- Full platform / unified icon -->
      <circle cx="30" cy="30" r="24" fill="none" stroke="#FFB703" stroke-width="2"/>
      <circle cx="30" cy="30" r="16" fill="none" stroke="#00B4D8" stroke-width="1.5"/>
      <circle cx="30" cy="30" r="8" fill="none" stroke="#2DC653" stroke-width="1.5"/>
      <circle cx="30" cy="30" r="3" fill="#FFFFFF"/>
      <!-- Radiating lines -->
      <line x1="30" y1="2" x2="30" y2="8" stroke="#FFB703" stroke-width="1.5"/>
      <line x1="30" y1="52" x2="30" y2="58" stroke="#FFB703" stroke-width="1.5"/>
      <line x1="2" y1="30" x2="8" y2="30" stroke="#FFB703" stroke-width="1.5"/>
      <line x1="52" y1="30" x2="58" y2="30" stroke="#FFB703" stroke-width="1.5"/>
    </svg>
  </div>

  <h1 class="module-name">Full Platform</h1>
  <p class="module-sub">Complete BiRAGAS Ecosystem</p>

  <ul class="features">
    <li><span class="feature-icon"></span>All modules integrated</li>
    <li><span class="feature-icon"></span>White-label deployment</li>
    <li><span class="feature-icon"></span>Co-development options</li>
    <li><span class="feature-icon"></span>Custom knowledge base</li>
    <li><span class="feature-icon"></span>Regulatory submission support</li>
  </ul>

  <div class="cta-bottom">Contact for Pricing</div>

  <div class="branding">
    <div class="brand-name">Ayass Bioscience</div>
    <div class="brand-tagline">Intelligent Biology in Motion</div>
  </div>
</div>
</body>
</html>
