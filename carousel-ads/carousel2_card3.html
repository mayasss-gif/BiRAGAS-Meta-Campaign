<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
<title>Carousel 2 - Card 3: Phase 3 Causal Calculus</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px;
    font-family: 'Inter', sans-serif;
    background: #0A1628;
    overflow: hidden;
    position: relative;
  }
  .phase-bg {
    position: absolute; top: -40px; right: -40px;
    font-size: 360px; font-weight: 900;
    color: rgba(255,183,3,0.04);
    line-height: 1;
  }
  .accent-glow {
    position: absolute;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: #FFB703;
    filter: blur(160px);
    opacity: 0.1;
    bottom: -100px; left: -100px;
  }
  .content {
    position: relative; z-index: 2;
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    padding: 60px 80px 100px;
  }
  .top-bar {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 40px;
  }
  .phase-label {
    font-size: 16px; font-weight: 700;
    color: #FFB703;
    letter-spacing: 4px;
    text-transform: uppercase;
  }
  .indicator {
    font-size: 20px; font-weight: 700;
    color: rgba(255,255,255,0.4);
    letter-spacing: 2px;
  }
  .phase-number {
    font-size: 100px; font-weight: 900;
    color: #FFB703;
    line-height: 1;
    margin-bottom: 8px;
  }
  .phase-name {
    font-size: 52px; font-weight: 900;
    color: #FFFFFF;
    line-height: 1.1;
    margin-bottom: 50px;
  }
  .icon-container {
    width: 100px; height: 100px;
    margin-bottom: 40px;
  }
  .bullets {
    list-style: none;
    flex: 1;
  }
  .bullets li {
    display: flex; align-items: center;
    font-size: 24px; font-weight: 500;
    color: rgba(255,255,255,0.85);
    margin-bottom: 24px;
  }
  .bullet-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #FFB703;
    margin-right: 20px;
    flex-shrink: 0;
  }
  .branding {
    position: absolute; bottom: 40px; left: 0; right: 0;
    text-align: center;
  }
  .brand-name {
    font-size: 20px; font-weight: 800;
    color: #FFFFFF;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .brand-tagline {
    font-size: 13px; font-weight: 400;
    color: rgba(255,255,255,0.4);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .top-accent {
    position: absolute; top: 0; left: 0; right: 0; height: 4px;
    background: #FFB703;
  }
  .side-accent {
    position: absolute; left: 0; top: 0; bottom: 0; width: 5px;
    background: linear-gradient(180deg, #FFB703, transparent);
  }
</style>
</head>
<body>
<div class="top-accent"></div>
<div class="side-accent"></div>
<div class="phase-bg">03</div>
<div class="accent-glow"></div>

<div class="content">
  <div class="top-bar">
    <span class="phase-label">Phase 3 of 7</span>
    <span class="indicator">3 / 7</span>
  </div>

  <div class="phase-number">03</div>
  <h1 class="phase-name">Causal<br>Calculus</h1>

  <div class="icon-container">
    <svg width="100" height="100" viewBox="0 0 100 100">
      <!-- Magnifying glass over edge -->
      <circle cx="42" cy="42" r="28" fill="none" stroke="#FFB703" stroke-width="2.5"/>
      <line x1="62" y1="62" x2="90" y2="90" stroke="#FFB703" stroke-width="4" stroke-linecap="round"/>
      <!-- Edge inside magnifying glass -->
      <circle cx="30" cy="38" r="5" fill="rgba(255,183,3,0.3)" stroke="#FFB703" stroke-width="1.5"/>
      <circle cx="54" cy="38" r="5" fill="rgba(255,183,3,0.3)" stroke="#FFB703" stroke-width="1.5"/>
      <line x1="35" y1="38" x2="49" y2="38" stroke="#FFB703" stroke-width="2"/>
      <polygon points="48,34 54,38 48,42" fill="#FFB703"/>
    </svg>
  </div>

  <ul class="bullets">
    <li><span class="bullet-dot"></span>5-dimension causal testing</li>
    <li><span class="bullet-dot"></span>5 hallucination categories</li>
    <li><span class="bullet-dot"></span>DAG-safe edge flipping</li>
    <li><span class="bullet-dot"></span>Pearl's backdoor criterion</li>
  </ul>

  <div class="branding">
    <div class="brand-name">Ayass Bioscience</div>
    <div class="brand-tagline">Intelligent Biology in Motion</div>
  </div>
</div>
</body>
</html>
