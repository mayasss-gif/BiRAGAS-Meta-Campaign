<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
<title>Carousel 2 - Card 1: Phase 1 Causality Foundation</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px;
    font-family: 'Inter', sans-serif;
    background: #0A1628;
    overflow: hidden;
    position: relative;
  }
  .phase-bg {
    position: absolute; top: -40px; right: -40px;
    font-size: 360px; font-weight: 900;
    color: rgba(0,180,216,0.04);
    line-height: 1;
    letter-spacing: -10px;
  }
  .accent-glow {
    position: absolute;
    width: 400px; height: 400px;
    border-radius: 50%;
    background: #00B4D8;
    filter: blur(160px);
    opacity: 0.1;
    bottom: -100px; left: -100px;
  }
  .content {
    position: relative; z-index: 2;
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    padding: 60px 80px 100px;
  }
  .top-bar {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 40px;
  }
  .phase-label {
    font-size: 16px; font-weight: 700;
    color: #00B4D8;
    letter-spacing: 4px;
    text-transform: uppercase;
  }
  .indicator {
    font-size: 20px; font-weight: 700;
    color: rgba(255,255,255,0.4);
    letter-spacing: 2px;
  }
  .phase-number {
    font-size: 100px; font-weight: 900;
    color: #00B4D8;
    line-height: 1;
    margin-bottom: 8px;
  }
  .phase-name {
    font-size: 52px; font-weight: 900;
    color: #FFFFFF;
    line-height: 1.1;
    margin-bottom: 50px;
    letter-spacing: -1px;
  }
  .icon-container {
    width: 100px; height: 100px;
    margin-bottom: 40px;
  }
  .bullets {
    list-style: none;
    flex: 1;
  }
  .bullets li {
    display: flex; align-items: center;
    font-size: 24px; font-weight: 500;
    color: rgba(255,255,255,0.85);
    margin-bottom: 24px;
    line-height: 1.4;
  }
  .bullet-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #00B4D8;
    margin-right: 20px;
    flex-shrink: 0;
  }
  .branding {
    position: absolute; bottom: 40px; left: 0; right: 0;
    text-align: center;
  }
  .brand-name {
    font-size: 20px; font-weight: 800;
    color: #FFFFFF;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .brand-tagline {
    font-size: 13px; font-weight: 400;
    color: rgba(255,255,255,0.4);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .top-accent {
    position: absolute; top: 0; left: 0; right: 0; height: 4px;
    background: linear-gradient(90deg, #00B4D8, #00B4D8);
  }
  .side-accent {
    position: absolute; left: 0; top: 0; bottom: 0; width: 5px;
    background: linear-gradient(180deg, #00B4D8, transparent);
  }
</style>
</head>
<body>
<div class="top-accent"></div>
<div class="side-accent"></div>
<div class="phase-bg">01</div>
<div class="accent-glow"></div>

<div class="content">
  <div class="top-bar">
    <span class="phase-label">Phase 1 of 7</span>
    <span class="indicator">1 / 7</span>
  </div>

  <div class="phase-number">01</div>
  <h1 class="phase-name">Causality<br>Foundation</h1>

  <div class="icon-container">
    <svg width="100" height="100" viewBox="0 0 100 100">
      <!-- DAG/Network icon -->
      <circle cx="50" cy="15" r="8" fill="none" stroke="#00B4D8" stroke-width="2.5"/>
      <circle cx="20" cy="50" r="8" fill="none" stroke="#00B4D8" stroke-width="2.5"/>
      <circle cx="80" cy="50" r="8" fill="none" stroke="#00B4D8" stroke-width="2.5"/>
      <circle cx="35" cy="85" r="8" fill="none" stroke="#00B4D8" stroke-width="2.5"/>
      <circle cx="65" cy="85" r="8" fill="none" stroke="#00B4D8" stroke-width="2.5"/>
      <line x1="45" y1="22" x2="25" y2="43" stroke="#00B4D8" stroke-width="1.5"/>
      <line x1="55" y1="22" x2="75" y2="43" stroke="#00B4D8" stroke-width="1.5"/>
      <line x1="25" y1="58" x2="32" y2="78" stroke="#00B4D8" stroke-width="1.5"/>
      <line x1="75" y1="58" x2="68" y2="78" stroke="#00B4D8" stroke-width="1.5"/>
      <line x1="28" y1="52" x2="72" y2="52" stroke="#00B4D8" stroke-width="1" stroke-dasharray="4,3"/>
    </svg>
  </div>

  <ul class="bullets">
    <li><span class="bullet-dot"></span>9 heterogeneous data streams</li>
    <li><span class="bullet-dot"></span>4-layer topological architecture</li>
    <li><span class="bullet-dot"></span>Patient-level DAG instantiation</li>
    <li><span class="bullet-dot"></span>Mendelian Randomization validation</li>
  </ul>

  <div class="branding">
    <div class="brand-name">Ayass Bioscience</div>
    <div class="brand-tagline">Intelligent Biology in Motion</div>
  </div>
</div>
</body>
</html>
