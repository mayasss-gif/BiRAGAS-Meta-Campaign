<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
<title>Carousel 1 - Card 1: The Problem</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px;
    font-family: 'Inter', sans-serif;
    background: #0A1628;
    overflow: hidden;
    position: relative;
  }
  .bg-pattern {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    opacity: 0.06;
  }
  .content {
    position: relative; z-index: 2;
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    padding: 80px;
  }
  .headline {
    font-size: 64px; font-weight: 900;
    color: #FFFFFF;
    text-align: center;
    line-height: 1.1;
    margin-bottom: 32px;
    letter-spacing: -1px;
  }
  .headline span { color: #FFB703; }
  .subtext {
    font-size: 26px; font-weight: 400;
    color: rgba(255,255,255,0.75);
    text-align: center;
    line-height: 1.5;
    max-width: 800px;
    margin-bottom: 60px;
  }
  .subtext strong { color: #00B4D8; font-weight: 700; }
  .visual-container {
    width: 820px; height: 260px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 40px;
  }
  .indicator {
    position: absolute; top: 48px; right: 56px;
    font-size: 20px; font-weight: 700;
    color: rgba(255,255,255,0.4);
    letter-spacing: 2px;
  }
  .branding {
    position: absolute; bottom: 48px; left: 0; right: 0;
    text-align: center;
  }
  .brand-name {
    font-size: 22px; font-weight: 800;
    color: #FFFFFF;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .brand-tagline {
    font-size: 14px; font-weight: 400;
    color: rgba(255,255,255,0.45);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .top-accent {
    position: absolute; top: 0; left: 0; right: 0; height: 4px;
    background: linear-gradient(90deg, #00B4D8, #FFB703, #2DC653);
  }
</style>
</head>
<body>
<div class="top-accent"></div>
<svg class="bg-pattern" width="1080" height="1080">
  <defs>
    <pattern id="net" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <circle cx="30" cy="30" r="1.5" fill="#FFFFFF"/>
      <line x1="30" y1="30" x2="60" y2="0" stroke="#FFFFFF" stroke-width="0.5"/>
      <line x1="30" y1="30" x2="0" y2="60" stroke="#FFFFFF" stroke-width="0.5"/>
      <line x1="30" y1="30" x2="60" y2="60" stroke="#FFFFFF" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="1080" height="1080" fill="url(#net)"/>
</svg>

<div class="content">
  <div class="indicator">1 / 5</div>

  <h1 class="headline">Your Biomarkers Are<br><span>Lying to You</span></h1>

  <div class="visual-container">
    <svg width="820" height="260" viewBox="0 0 820 260">
      <!-- Left side: Correlation (tangled) -->
      <text x="160" y="30" fill="rgba(255,255,255,0.3)" font-family="Inter" font-size="16" font-weight="700" text-anchor="middle" letter-spacing="3">CORRELATION</text>
      <path d="M40,60 C120,200 80,80 200,180 C240,60 100,220 280,100 C300,200 200,60 160,200" stroke="#FF6B6B" stroke-width="2.5" fill="none" opacity="0.7"/>
      <path d="M60,180 C140,40 180,220 240,60 C260,200 120,100 300,180" stroke="#FFB703" stroke-width="2.5" fill="none" opacity="0.6"/>
      <path d="M30,120 C100,60 150,200 220,80 C250,180 200,40 310,140" stroke="#E91E8C" stroke-width="2.5" fill="none" opacity="0.5"/>
      <path d="M80,80 C130,220 200,40 260,200 C280,80 160,180 300,60" stroke="#7B68EE" stroke-width="2.5" fill="none" opacity="0.5"/>
      <path d="M50,200 C110,100 170,160 230,40 C270,160 140,120 290,200" stroke="#FF6B6B" stroke-width="2" fill="none" opacity="0.4"/>
      <!-- Question marks -->
      <text x="100" y="145" fill="rgba(255,107,107,0.5)" font-family="Inter" font-size="40" font-weight="800">?</text>
      <text x="220" y="120" fill="rgba(255,183,3,0.5)" font-family="Inter" font-size="32" font-weight="800">?</text>

      <!-- Divider -->
      <line x1="410" y1="20" x2="410" y2="250" stroke="rgba(255,255,255,0.2)" stroke-width="2" stroke-dasharray="6,6"/>
      <text x="410" y="258" fill="rgba(255,255,255,0.25)" font-family="Inter" font-size="12" font-weight="600" text-anchor="middle">VS</text>

      <!-- Right side: Causation (clean directed arrows) -->
      <text x="640" y="30" fill="rgba(255,255,255,0.3)" font-family="Inter" font-size="16" font-weight="700" text-anchor="middle" letter-spacing="3">CAUSATION</text>
      <defs>
        <marker id="arrowTeal" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="#00B4D8"/>
        </marker>
        <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
          <polygon points="0 0, 10 3.5, 0 7" fill="#2DC653"/>
        </marker>
      </defs>
      <!-- Clean nodes -->
      <circle cx="520" cy="70" r="12" fill="none" stroke="#00B4D8" stroke-width="2.5"/>
      <circle cx="640" cy="70" r="12" fill="none" stroke="#00B4D8" stroke-width="2.5"/>
      <circle cx="760" cy="70" r="12" fill="none" stroke="#00B4D8" stroke-width="2.5"/>
      <circle cx="580" cy="150" r="12" fill="none" stroke="#2DC653" stroke-width="2.5"/>
      <circle cx="700" cy="150" r="12" fill="none" stroke="#2DC653" stroke-width="2.5"/>
      <circle cx="640" cy="230" r="14" fill="none" stroke="#FFB703" stroke-width="2.5"/>
      <!-- Directed arrows -->
      <line x1="528" y1="80" x2="572" y2="140" stroke="#00B4D8" stroke-width="2" marker-end="url(#arrowTeal)"/>
      <line x1="636" y1="82" x2="588" y2="140" stroke="#00B4D8" stroke-width="2" marker-end="url(#arrowTeal)"/>
      <line x1="644" y1="82" x2="692" y2="140" stroke="#00B4D8" stroke-width="2" marker-end="url(#arrowTeal)"/>
      <line x1="756" y1="82" x2="708" y2="140" stroke="#00B4D8" stroke-width="2" marker-end="url(#arrowTeal)"/>
      <line x1="588" y1="160" x2="632" y2="218" stroke="#2DC653" stroke-width="2" marker-end="url(#arrowGreen)"/>
      <line x1="692" y1="160" x2="648" y2="218" stroke="#2DC653" stroke-width="2" marker-end="url(#arrowGreen)"/>
      <!-- Checkmark -->
      <text x="740" y="240" fill="rgba(45,198,83,0.6)" font-family="Inter" font-size="36" font-weight="800">&#10003;</text>
    </svg>
  </div>

  <p class="subtext">Correlational analysis identifies associations.<br><strong>BiRAGAS</strong> identifies <strong>causes</strong>.</p>

  <div class="branding">
    <div class="brand-name">Ayass Bioscience</div>
    <div class="brand-tagline">Intelligent Biology in Motion</div>
  </div>
</div>
</body>
</html>
