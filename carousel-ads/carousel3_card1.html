<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
<title>Carousel 3 - Card 1: Causal Engine</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px;
    font-family: 'Inter', sans-serif;
    background: #0A1628;
    overflow: hidden;
    position: relative;
  }
  .bg-gradient {
    position: absolute; top: 0; right: 0; bottom: 0; left: 0;
    background: linear-gradient(160deg, #0A1628 0%, #0B2540 60%, #0A2A3C 100%);
  }
  .accent-glow {
    position: absolute;
    width: 500px; height: 500px;
    border-radius: 50%;
    background: #00B4D8;
    filter: blur(180px);
    opacity: 0.08;
    top: -100px; right: -100px;
  }
  .content {
    position: relative; z-index: 2;
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center;
    padding: 70px 80px 120px;
  }
  .top-bar {
    display: flex; justify-content: space-between; align-items: center;
    width: 100%;
    margin-bottom: 30px;
  }
  .module-label {
    font-size: 15px; font-weight: 700;
    color: #00B4D8;
    letter-spacing: 4px;
    text-transform: uppercase;
  }
  .indicator {
    font-size: 20px; font-weight: 700;
    color: rgba(255,255,255,0.4);
    letter-spacing: 2px;
  }
  .icon-container {
    width: 120px; height: 120px;
    border-radius: 28px;
    background: rgba(0,180,216,0.08);
    border: 2px solid rgba(0,180,216,0.2);
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 40px;
  }
  .module-name {
    font-size: 56px; font-weight: 900;
    color: #FFFFFF;
    text-align: center;
    margin-bottom: 16px;
    letter-spacing: -1px;
  }
  .module-sub {
    font-size: 20px; font-weight: 400;
    color: rgba(255,255,255,0.45);
    margin-bottom: 60px;
    letter-spacing: 1px;
  }
  .features {
    list-style: none;
    width: 100%;
    max-width: 700px;
  }
  .features li {
    display: flex; align-items: center;
    padding: 22px 28px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 14px;
    margin-bottom: 14px;
    font-size: 24px; font-weight: 500;
    color: rgba(255,255,255,0.85);
  }
  .feature-icon {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #00B4D8;
    margin-right: 20px;
    flex-shrink: 0;
  }
  .cta-bottom {
    margin-top: auto;
    font-size: 18px; font-weight: 600;
    color: #00B4D8;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .branding {
    position: absolute; bottom: 40px; left: 0; right: 0;
    text-align: center;
  }
  .brand-name {
    font-size: 20px; font-weight: 800;
    color: #FFFFFF;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .brand-tagline {
    font-size: 13px; font-weight: 400;
    color: rgba(255,255,255,0.4);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .top-accent {
    position: absolute; top: 0; left: 0; right: 0; height: 4px;
    background: linear-gradient(90deg, #00B4D8, #2DC653);
  }
</style>
</head>
<body>
<div class="bg-gradient"></div>
<div class="top-accent"></div>
<div class="accent-glow"></div>

<div class="content">
  <div class="top-bar">
    <span class="module-label">Licensing Module</span>
    <span class="indicator">1 / 5</span>
  </div>

  <div class="icon-container">
    <svg width="60" height="60" viewBox="0 0 60 60">
      <circle cx="30" cy="12" r="6" fill="none" stroke="#00B4D8" stroke-width="2"/>
      <circle cx="12" cy="35" r="6" fill="none" stroke="#00B4D8" stroke-width="2"/>
      <circle cx="48" cy="35" r="6" fill="none" stroke="#00B4D8" stroke-width="2"/>
      <circle cx="30" cy="50" r="6" fill="none" stroke="#00B4D8" stroke-width="2"/>
      <line x1="26" y1="17" x2="16" y2="30" stroke="#00B4D8" stroke-width="1.5"/>
      <line x1="34" y1="17" x2="44" y2="30" stroke="#00B4D8" stroke-width="1.5"/>
      <line x1="17" y1="40" x2="25" y2="47" stroke="#00B4D8" stroke-width="1.5"/>
      <line x1="43" y1="40" x2="35" y2="47" stroke="#00B4D8" stroke-width="1.5"/>
    </svg>
  </div>

  <h1 class="module-name">Causal Engine</h1>
  <p class="module-sub">Core Causal Discovery Platform</p>

  <ul class="features">
    <li><span class="feature-icon"></span>Validated causal graphs</li>
    <li><span class="feature-icon"></span>Confidence-scored targets</li>
    <li><span class="feature-icon"></span>Regulatory-grade evidence</li>
    <li><span class="feature-icon"></span>6 integrated workflows</li>
  </ul>

  <div class="cta-bottom">Contact for Pricing</div>

  <div class="branding">
    <div class="brand-name">Ayass Bioscience</div>
    <div class="brand-tagline">Intelligent Biology in Motion</div>
  </div>
</div>
</body>
</html>
