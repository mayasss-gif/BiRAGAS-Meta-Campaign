<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
<title>Carousel 1 - Card 5: CTA</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1080px; height: 1080px;
    font-family: 'Inter', sans-serif;
    background: linear-gradient(160deg, #006D8F 0%, #00B4D8 40%, #009EC3 70%, #007A9C 100%);
    overflow: hidden;
    position: relative;
  }
  .bg-glow {
    position: absolute;
    width: 600px; height: 600px;
    border-radius: 50%;
    filter: blur(150px);
    opacity: 0.2;
  }
  .bg-glow-1 { background: #FFFFFF; top: -200px; left: 50%; transform: translateX(-50%); }
  .bg-glow-2 { background: #0A1628; bottom: -200px; left: 50%; transform: translateX(-50%); }
  .pattern {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    opacity: 0.04;
    background-image: radial-gradient(circle, #FFFFFF 1px, transparent 1px);
    background-size: 40px 40px;
  }
  .content {
    position: relative; z-index: 2;
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    padding: 80px;
  }
  .indicator {
    position: absolute; top: 48px; right: 56px;
    font-size: 20px; font-weight: 700;
    color: rgba(255,255,255,0.5);
    letter-spacing: 2px;
  }
  .logo-text {
    font-size: 56px; font-weight: 900;
    color: #FFFFFF;
    letter-spacing: 6px;
    text-transform: uppercase;
    margin-bottom: 16px;
    text-shadow: 0 2px 20px rgba(0,0,0,0.2);
  }
  .tagline {
    font-size: 34px; font-weight: 300;
    color: #FFFFFF;
    margin-bottom: 80px;
    letter-spacing: 3px;
    opacity: 0.9;
  }
  .divider {
    width: 120px; height: 3px;
    background: rgba(255,255,255,0.4);
    border-radius: 2px;
    margin-bottom: 80px;
  }
  .cta-text {
    font-size: 28px; font-weight: 500;
    color: #FFFFFF;
    text-align: center;
    margin-bottom: 50px;
    opacity: 0.85;
    line-height: 1.5;
  }
  .url {
    font-size: 24px; font-weight: 400;
    color: rgba(255,255,255,0.7);
    margin-bottom: 50px;
    letter-spacing: 1px;
  }
  .cta-button {
    display: inline-flex; align-items: center;
    padding: 22px 64px;
    background: #FFFFFF;
    color: #006D8F;
    font-size: 24px; font-weight: 800;
    border-radius: 60px;
    letter-spacing: 1px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.2);
  }
  .cta-button span {
    margin-left: 12px;
    font-size: 28px;
  }
  .branding {
    position: absolute; bottom: 48px; left: 0; right: 0;
    text-align: center;
  }
  .brand-tagline-bottom {
    font-size: 14px; font-weight: 400;
    color: rgba(255,255,255,0.45);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .top-accent {
    position: absolute; top: 0; left: 0; right: 0; height: 4px;
    background: linear-gradient(90deg, #FFB703, #FFFFFF, #2DC653);
  }
</style>
</head>
<body>
<div class="top-accent"></div>
<div class="bg-glow bg-glow-1"></div>
<div class="bg-glow bg-glow-2"></div>
<div class="pattern"></div>

<div class="content">
  <div class="indicator">5 / 5</div>

  <div class="logo-text">Ayass Bioscience</div>
  <div class="tagline">Intelligent Biology in Motion</div>

  <div class="divider"></div>

  <p class="cta-text">Discover how BiRAGAS transforms<br>your discovery pipeline</p>

  <div class="url">ayassbioscience.com</div>

  <div class="cta-button">Learn More <span>&rarr;</span></div>

  <div class="branding">
    <div class="brand-tagline-bottom">Causal Genomics &bull; Drug Discovery &bull; Precision Medicine</div>
  </div>
</div>
</body>
</html>
